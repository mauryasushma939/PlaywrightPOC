# This workflow allows you to run Playwright tests in headless mode and generate an Allure report.
name: Playwright Manual Run

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run Playwright tests in headless mode
        run: |
          npx playwright test --headed=false

      - name: Generate Allure report
        run: |
          npx allure generate --clean --output allure-report
          npx allure open allure-report