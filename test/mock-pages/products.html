<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swag Labs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .header {
            background-color: #3b82f6;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
        }
        .inventory-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .inventory-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .inventory-item:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .inventory-item-name {
            font-weight: bold;
            margin-bottom: 10px;
            color: #3b82f6;
        }
        .inventory-item-price {
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Swag Labs</h1>
    </div>
    
    <div class="title">Products</div>
    
    <div class="inventory-container">
        <div class="inventory-item" onclick="showProductDetails('Sauce Labs Backpack', '$29.99')">
            <div class="inventory-item-name">Sauce Labs Backpack</div>
            <div class="inventory-item-desc">carry.allTheThings() with the sleek, streamlined Sly Pack</div>
            <div class="inventory-item-price">$29.99</div>
        </div>
        
        <div class="inventory-item" onclick="showProductDetails('Sauce Labs Bike Light', '$9.99')">
            <div class="inventory-item-name">Sauce Labs Bike Light</div>
            <div class="inventory-item-desc">A red light isn't the desired state in testing</div>
            <div class="inventory-item-price">$9.99</div>
        </div>
        
        <div class="inventory-item" onclick="showProductDetails('Sauce Labs Bolt T-Shirt', '$15.99')">
            <div class="inventory-item-name">Sauce Labs Bolt T-Shirt</div>
            <div class="inventory-item-desc">Get your testing superhero on</div>
            <div class="inventory-item-price">$15.99</div>
        </div>
    </div>

    <script>
        function showProductDetails(name, price) {
            // Create a simple product details page
            document.body.innerHTML = `
                <div class="header">
                    <h1>Swag Labs</h1>
                </div>
                <div style="padding: 20px; background: white; margin: 20px; border-radius: 8px;">
                    <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">${name}</div>
                    <div class="inventory_details_price" style="font-size: 20px; color: #3b82f6; margin: 10px 0;">${price}</div>
                    <button onclick="history.back()" style="padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">Back to Products</button>
                </div>
            `;
        }
    </script>
</body>
</html>
